<script>
var fileContents = {"Automate Faceless Content.md": "Automate Faceless Content là một dự án open-source dạng “blueprint” giúp tự động hoá toàn bộ quy trình sản xuất video không lộ mặt bằng AI — từ ý tưởng đến đăng bài.\n\n\nKhác với tool truyền thống, đây không phải phần mềm cài đặt, mà là hệ thống workflow + guide chi tiết để build content machine: idea → script → video → publish hoàn toàn tự động. ￼\n\n\nCác thành phần chính:\n\n\n* Idea discovery: tìm chủ đề viral theo data\n\n* Script generation bằng AI (ChatGPT/LLM)\n\n* Tạo video từ text/audio/image\n\n* Voice AI + subtitle tự động\n\n* Bulk scheduling đa nền tảng\n\n* Workflow cho YouTube, TikTok, Instagram\n\n\nUsecase rõ ràng:\n\n\n* Xây kênh faceless YouTube/TikTok\n\n* Scale nhiều kênh content cùng lúc\n\n* Làm affiliate, kiếm tiền từ nội dung tự động\n\n* Xây “content factory” cho agency\n\n\nĐiểm mạnh nhất là biến việc làm content từ thủ công thành hệ thống có thể scale, giúp tiết kiệm lớn thời gian và dễ nhân bản mô hình. ￼\n\n\nĐây là một hướng rất phù hợp cho ai muốn build hệ thống content automation hoặc AI Agent làm media thay người.", "DeepSeek ds2api.md": "🎉 Dùng DeepSeek v4 miễn phí với API, một dự án open-source rất đáng chú\ný trong hệ sinh thái AI dev, đóng vai trò như một “middleware chuyển\nđổi” giúp biến DeepSeek Web thành API chuẩn dùng được ngay cho mọi tool.\n\nThay vì phải dùng giao diện web của DeepSeek, ds2api reverse-engineer\ngiao thức và expose lại dưới dạng API tương thích OpenAI, Claude và\nGemini — chỉ cần đổi base URL là có thể dùng với SDK, LangChain, Cursor\nhoặc bất kỳ AI app nào. ￼\n\nĐiểm nổi bật:\n\n\\* Tương thích OpenAI / Claude / Gemini API (drop-in replacement)\n\n\\* Multi-account rotation để scale và tránh rate limit\n\n\\* Streaming response, embeddings, file API đầy đủ\n\n\\* Viết bằng Go, chạy dạng single binary rất nhẹ\n\n\\* Có WebUI quản lý + hỗ trợ Docker, Vercel deploy\n\n\\* Tích hợp PoW DeepSeek trực tiếp để hoạt động ổn định ￼\n\nUsecase rất rõ:\n\n\\* Dùng DeepSeek miễn phí như một API backend\n\n\\* Thay thế OpenAI API cho tool dev (Cursor, OpenWebUI…)\n\n\\* Build AI Agent nội bộ chi phí thấp\n\n\\* Test, prototype LLM app nhanh mà không cần trả phí\n\nĐiểm đáng chú ý nhất là ds2api giúp “unlock” DeepSeek Web thành hạ tầng\nAPI tiêu chuẩn, biến một chat UI thành backend có thể tích hợp vào mọi\nhệ thống.\n\nĐây là mảnh ghép rất mạnh cho dev muốn build AI system nhưng tối ưu chi\nphí và linh hoạt backend.\n\n\\#TiniX \\#OpenSource \\#LLM \\#AIAgents", "Faster Qwen3 TTS.md": "👍 Faster Qwen3 TTS là một dự án open-source tập trung giải quyết bài\ntoán lớn nhất của voice AI hiện nay: latency và realtime khi chạy local.\n\nDự án này tối ưu Qwen3-TTS bằng cách dùng CUDA Graph để gom hàng trăm\nkernel nhỏ thành một bước chạy duy nhất, giúp tăng tốc mạnh mà không cần\nFlash Attention hay vLLM. ￼\n\nKết quả là có thể đạt tốc độ nhanh hơn realtime (RTF &gt; 1), với\ntime-to-first-audio chỉ \\~150–400ms trên GPU phổ biến như RTX 4090. ￼\n\nCác điểm nổi bật:\n\n\\* Realtime TTS + streaming audio (phát ra từng chunk ngay khi generate)\n\n\\* Voice cloning từ audio mẫu\n\n\\* Hỗ trợ cả streaming và non-streaming\n\n\\* OpenAI-compatible API (drop-in cho app hiện có)\n\n\\* Có CLI, Python API và WebUI demo\n\n\\* Tối ưu mạnh trên GPU nhưng vẫn giữ chất lượng gần như tương đương bản\ngốc ￼\n\nUsecase rất rõ:\n\n\\* Voice agent realtime (AI gọi điện, trợ lý ảo)\n\n\\* Dub video, podcast, audiobook\n\n\\* TTS backend cho chatbot/AI app\n\n\\* Local voice pipeline không cần SaaS\n\nĐiểm đáng chú ý là dự án không thay đổi model mà tối ưu cách chạy → giữ\nchất lượng nhưng tăng tốc 2–9x, biến Qwen3-TTS từ “gần realtime” thành\n“thực sự realtime”.\n\nlưu lại từ internet", "Linh hon quang cao.md": "Quyển sách Linh hồn quảng cáo trình bày về bản chất và phương pháp sáng\ntạo \"ý tưởng lớn\" (concept) trong lĩnh vực quảng cáo và kinh doanh hiện\nđại. Tác giả Nobuyuki Takahashi định nghĩa đây là giá trị cốt lõi và kim\nchỉ nam giúp doanh nghiệp thích ứng với sự thay đổi không ngừng của thời\nđại số. Nguồn tin nhấn mạnh rằng một ý tưởng thành công phải kết hợp\ngiữa tư duy lý tính và cảm tính, đi kèm năng lực diễn đạt thành ngôn từ\nthu hút. Qua 86 ví dụ thực tế, tác giả minh họa cách phá bỏ các định\nkiến cũ để tạo ra những lập trường mới độc nhất. Quy trình sáng tạo được\nhệ thống hóa qua bốn bước cơ bản từ nhận thức hiện trạng đến phát hiện\ngiá trị mới. Cuối cùng, cuốn sách khẳng định ý tưởng lớn chính là phép\nmàu tạo nên sức cạnh tranh và sự kết nối bền vững giữa thương hiệu với\nkhách hàng.", "MarkItDown.md": "MarkItDown là một công cụ Python mã nguồn mở giúp chuyển đổi nhiều loại file và tài liệu văn phòng sang định dạng Markdown.\n\nTrong doanh nghiệp, dữ liệu không thiếu. Cái thiếu là dữ liệu đủ sạch, đủ có cấu trúc và đủ dễ đọc để AI có thể xử lý hiệu quả. Rất nhiều tri thức nội bộ đang nằm rải rác trong PDF, Word, PowerPoint, Excel, HTML, CSV, JSON, file ảnh, file âm thanh, thậm chí cả link YouTube. Vấn đề là: các định dạng này vốn được thiết kế cho con người đọc, không phải cho AI phân tích, truy xuất và tái sử dụng trong các pipeline LLM.\n\nMarkItDown là một công cụ Python mã nguồn mở giúp chuyển đổi nhiều loại file và tài liệu văn phòng sang định dạng Markdown một định dạng gần với plain text, nhẹ, rõ cấu trúc và đặc biệt thân thiện với LLMs. Repo hiện có khoảng 120k stars trên GitHub, cho thấy nhu cầu rất lớn của cộng đồng với bài toán “biến tài liệu thô thành dữ liệu sẵn sàng cho AI”. \n\nVì sao Markdown lại quan trọng trong kỷ nguyên AI?\nMarkdown không chỉ là định dạng viết tài liệu cho lập trình viên.\nTrong bối cảnh AI, Markdown trở thành một “ngôn ngữ trung gian” rất hữu ích giữa tài liệu doanh nghiệp và mô hình ngôn ngữ lớn. Nó giữ lại được những cấu trúc quan trọng như tiêu đề, danh sách, bảng, liên kết… nhưng vẫn đủ gọn để AI đọc, phân tích và xử lý tiết kiệm token hơn. Chính README của MarkItDown cũng nhấn mạnh rằng các LLM phổ biến hiểu Markdown rất tốt và thường tự dùng Markdown trong phản hồi. \nNói đơn giản:\nPDF, Word, PowerPoint là tài liệu để con người đọc.\nMarkdown là dạng tài liệu mà AI có thể “tiêu hóa” tốt hơn.\n\nMarkItDown làm được gì?\nMarkItDown hỗ trợ chuyển đổi nhiều định dạng phổ biến sang Markdown, bao gồm:\nPDF, PowerPoint, Word, Excel, ảnh, âm thanh, HTML, CSV, JSON, XML, ZIP, YouTube URL, EPUB và nhiều định dạng khác. Với ảnh và PowerPoint, công cụ còn có thể kết hợp LLM để mô tả hình ảnh; với audio, có thể hỗ trợ metadata và speech transcription tùy cấu hình phụ thuộc. \n\nCách dùng cơ bản rất đơn giản:\npip install 'markitdown[all]'\nmarkitdown path-to-file.pdf -o document.md\nHoặc dùng trực tiếp trong Python:\nfrom markitdown import MarkItDown\n\nmd = MarkItDown()\nresult = md.convert(\"test.xlsx\")\nprint(result.text_content)\n\nĐiểm hay là công cụ này không cố biến tài liệu thành bản trình bày đẹp cho con người. Nó tập trung vào việc giữ lại nội dung và cấu trúc quan trọng để phục vụ phân tích văn bản, RAG, chatbot, agent, tìm kiếm tri thức và các pipeline AI. \n\nỨng dụng thực tế trong doanh nghiệp\nTôi nhìn MarkItDown như một mảnh ghép rất quan trọng trong hệ thống AI Knowledge Pipeline của doanh nghiệp.\nMột số tình huống ứng dụng rất thực tế:\n1. Xây dựng kho tri thức nội bộ cho chatbot doanh nghiệp\nChuyển SOP, quy trình, tài liệu đào tạo, chính sách nhân sự, tài liệu sản phẩm từ PDF/Word/PPT sang Markdown để đưa vào hệ thống RAG.\n2. Chuẩn hóa dữ liệu trước khi đưa vào AI Agent\nThay vì để agent đọc file gốc lộn xộn, ta chuẩn hóa tài liệu về Markdown, chia nhỏ theo section, gắn metadata, rồi mới đưa vào vector database hoặc knowledge base.\n3. Tạo dữ liệu đầu vào cho Claude Code, ChatGPT, Gemini, NotebookLM\nVới những tài liệu dài, việc có bản Markdown giúp AI dễ tóm tắt, trích xuất insight, tạo outline, viết lại, phân tích hoặc chuyển thành template đào tạo.\n4. Tự động hóa xử lý tài liệu bằng n8n hoặc workflow nội bộ\nVí dụ: khi có file mới trong Google Drive, hệ thống tự chuyển sang Markdown, lưu vào kho tri thức, tạo bản tóm tắt, sinh câu hỏi kiểm tra, hoặc cập nhật chatbot nội bộ.\n5. Biến tài liệu cũ thành tài sản AI-ready\nNhiều doanh nghiệp có hàng nghìn file tài liệu cũ nhưng chưa dùng được cho AI. MarkItDown có thể là bước đầu để “khai khoáng” lại khối tri thức này.\n\nNhưng cần lưu ý một điểm rất quan trọng\nMarkItDown không phải là công cụ “convert tài liệu đẹp” để xuất bản cho người đọc cuối. Nó phù hợp hơn cho mục tiêu chuẩn hóa nội dung để AI phân tích.\nNgoài ra, Microsoft cũng cảnh báo rõ rằng MarkItDown thực hiện I/O với quyền của tiến trình hiện tại. Điều này có nghĩa là khi dùng trong môi trường server hoặc xử lý input không tin cậy, doanh nghiệp cần kiểm soát file path, URI, nguồn dữ liệu, quyền truy cập và nên dùng API chuyển đổi hẹp nhất phù hợp với từng trường hợp. Đây là điểm rất quan trọng nếu triển khai trong môi trường doanh nghiệp, đặc biệt khi hệ thống có quyền truy cập vào tài liệu nội bộ, file nhạy cảm hoặc network nội bộ.\n\nRất nhiều dự án AI thất bại không phải vì model yếu, mà vì tài liệu đầu vào rối, thiếu cấu trúc, khó truy xuất, khó kiểm chứng và không được chuẩn hóa.\nMarkItDown giải quyết một lớp rất nền tảng trong bài toán đó:\nbiến tài liệu doanh nghiệp từ dạng lưu trữ bị động thành dạng tri thức có thể được AI khai thác.\n\nTrong kiến trúc AI First cho doanh nghiệp, tôi sẽ đặt MarkItDown ở tầng đầu tiên của pipeline:\nTài liệu thô → Markdown → Làm sạch/chia đoạn/gắn metadata → Vector database/Knowledge base → Chatbot/Copilot/AI Agent\nĐây là một repo rất đáng để đội AI, IT, L&D, vận hành và chuyển đổi số trong doanh nghiệp thử nghiệm.", "obsidian-skills.md": "CEO của Obsidian chia sẻ repo bộ skills biến ghi chú thành hệ tri thức làm việc được với AI Agent!\n\n\nRepo obsidian-skills là một bộ kỹ năng giúp AI Agent hiểu và thao tác tốt hơn với Obsidian. Thay vì chỉ dùng Obsidian như nơi lưu ghi chú, repo này mở ra cách biến Obsidian thành một Second Brain có cấu trúc, nơi AI có thể đọc, viết, tìm kiếm, liên kết và trực quan hóa tri thức.\n\n\nĐiểm hay của repo nằm ở 5 nhóm skill chính:\n\n1. Obsidian Markdown\n\nGiúp AI viết ghi chú đúng chuẩn Obsidian: có wikilinks, tags, callouts, properties, embeds, Mermaid, footnotes… Nhờ đó, ghi chú không còn rời rạc mà được kết nối thành mạng lưới tri thức.\n\n2. Obsidian Bases\n\nGiúp biến các ghi chú thành dashboard hoặc database view. Ví dụ: quản lý bài viết, task, dự án, tài liệu học tập, ý tưởng, khách hàng hoặc tiến độ công việc ngay trong Obsidian.\n\n3. JSON Canvas\n\nGiúp AI tạo sơ đồ tư duy, flowchart, bản đồ tri thức hoặc mô hình hệ thống trong Obsidian Canvas. Đây là cách rất tốt để biến tài liệu dài thành hình dung trực quan.\n\n4. Obsidian CLI\n\nCho phép AI thao tác trực tiếp với vault: đọc note, tạo note mới, tìm kiếm, cập nhật properties, thêm task, kiểm tra backlinks… Đây là bước chuyển từ “AI hỗ trợ viết” sang “AI cùng vận hành second brain”.\n\n5. Defuddle\n\nGiúp làm sạch nội dung web, chuyển bài viết online thành Markdown gọn gàng trước khi đưa vào Obsidian. Rất hữu ích khi xây dựng kho tri thức từ tài liệu, blog, research, bài viết chuyên môn. Với chuyên gia, đây là môi trường nghiên cứu, viết lách và tổng hợp insight rất mạnh. Với doanh nghiệp, đây là gợi ý để xây dựng AI-ready knowledge base: một kho tri thức có cấu trúc, dễ tìm kiếm, dễ liên kết và có thể khai thác bởi AI Agent.\n\n\nObsidian giúp ta lưu tri thức. Obsidian Skills giúp AI hiểu và làm việc với tri thức đó. Khi kết hợp lại, Second Brain không còn là kho lưu trữ tĩnh, mà trở thành một hệ tri thức sống, có thể hỏi, cập nhật, kết nối và hành động.", "Qwen-Lens-Studio.md": "Nguồn mở sử dụng Qwen local để từ screenshot ra code và các ứng dụng\nMultimodal khác\n\nQwen-Lens-Studio là app mã nguồn mở giúp bạn dùng Qwen như một tool thực\ntế cho ảnh + document + UI, không chỉ demo model.\n\n<img src=\"media/image1.png\" style=\"width:0.75in;height:0.75in\" alt=\"⚡\" /> Tính\nnăng chính\n\n\\* Phân tích ảnh + reasoning\n\n\\* Trích xuất document → JSON (invoice, form…)\n\n\\* Screenshot → code (React/HTML)\n\n\\* Caption đa ngôn ngữ\n\n\\* So sánh ảnh (debug UI)\n\n<img src=\"media/image2.png\" style=\"width:0.75in;height:0.75in\" alt=\"🧠\" /> Vì\nsao đáng chú ý?\n\n\\* Biến multimodal AI → tool usable thật\n\n\\* Use case mạnh: UI → code, document AI\n\n\\* Hỗ trợ chạy local (Ollama, llama.cpp)\n\n<img src=\"media/image3.png\" style=\"width:0.75in;height:0.75in\" alt=\"🎯\" /> Kết\nluận\n\nKhông chỉ “hiểu ảnh”\n\n<img src=\"media/image4.png\" style=\"width:0.75in;height:0.75in\" alt=\"👉\" /> Qwen-Lens-Studio\ngiúp AI làm việc trực tiếp với ảnh", "Rapid-MLX.md": "Dự án open-source rất đáng chú ý cho ai muốn chạy AI local trên Mac\n(Apple Silicon) với hiệu năng cực cao và chi phí gần như bằng 0.\n\nRapid-MLX hoạt động như một AI engine tương thích OpenAI API, cho phép\nthay thế trực tiếp backend của ChatGPT bằng model local — chỉ cần đổi\nbase URL là dùng được với Cursor, Claude Code, LangChain hay bất kỳ app\nnào. ￼\n\nĐiểm nổi bật:\n\n\\* Tối ưu cho Apple Silicon (MLX), nhanh hơn Ollama \\~2–4x\n\n\\* Tốc độ rất cao (có thể đạt \\~168 tokens/s với model nhỏ)\n\n\\* Prompt cache giúp giảm thời gian phản hồi (TTFT) đáng kể\n\n\\* Hỗ trợ tool calling đầy đủ với 17 parser\n\n\\* Tách riêng reasoning và output (phù hợp agent)\n\n\\* Có cloud routing: tự đẩy request lớn lên GPT/Claude khi cần\n\n\\* Hỗ trợ multimodal: text, vision, audio, embeddings\n\n\\* Chạy local hoàn toàn, không cần API key ￼\n\nUsecase rõ ràng:\n\n\\* Chạy AI local cho dev (Cursor, Aider, coding agent)\n\n\\* Xây AI Agent nội bộ không phụ thuộc cloud\n\n\\* Làm backend thay thế OpenAI API\n\n\\* Tối ưu chi phí inference cho startup/team nhỏ\n\nĐiểm mạnh nhất là Rapid-MLX không chỉ “chạy được model”, mà đang tiến\ngần tới một local AI runtime hoàn chỉnh — nơi dev có thể build agent\nsystem full-stack ngay trên máy cá nhân.\n\n\\#TiniX \\#OpenSource \\#LocalAI \\#AIAgents", "Repository Understand-Anything.md": "Repository Understand-Anything trên GitHub là một công cụ AI cực kỳ mạnh mẽ giúp biến bất kỳ hệ thống mã nguồn (codebase), tài liệu hay cơ sở tri thức nào thành một sơ đồ tri thức trực quan và có tính tương tác (interactive knowledge graph).\n\nCông cụ này đặc biệt xuất sắc trong việc cung cấp ngay một bức tranh toàn cảnh cho những hệ thống phức tạp . Thay vì phải rà soát từng tài liệu hay đoạn mã thủ công – vốn mất nhiều thời gian và rất dễ bị quên hay sót chi tiết – người dùng có thể nhìn thẳng vào cấu trúc tổng thể, nắm bắt nhanh chóng các quy trình và từ đó đưa ra các quyết định chiến lược hiệu quả nhất để đạt được mục tiêu.\n\nCác tính năng cốt lõi nổi bật nhất của repo này:\n\nLuồng phân tích Multi-Agent AI: Sử dụng một hệ thống gồm nhiều AI agent chuyên biệt phối hợp với nhau để tự động quét toàn bộ dự án, bóc tách dữ liệu và vẽ lại tự động các luồng vận hành trong hệ thống.\n\nBản đồ Logic Kinh Doanh (Domain Graph): Không chỉ vẽ sơ đồ kỹ thuật thuần túy, công cụ còn liên kết dữ liệu thành các quy trình nghiệp vụ kinh doanh (business logic) thực tế, giúp dễ dàng định hướng và tối ưu hóa hệ thống.\n\nTương tác trực tiếp: Có thể nhấp vào bất kỳ thành phần nào trên sơ đồ để AI giải thích tóm tắt bằng ngôn ngữ tự nhiên thông thường.\n\nPhân tích Tác động (Diff Impact Analysis): Hiển thị trực quan việc thay đổi một điểm nhỏ sẽ ảnh hưởng dây chuyền đến các phần khác ra sao, giúp kiểm soát rủi ro triệt để.\n\nTương thích đa nền tảng: Hoạt động liền mạch với các trợ lý lập trình AI hàng đầu hiện nay như Cursor, Gemini CLI, Claude Code hay GitHub Copilot.\n\nĐây là một giải pháp cực kỳ tối ưu để ứng dụng trực tiếp vào việc quản lý, theo dõi các dự án AI và Automation. Nó giúp quy chuẩn hóa hệ thống rõ ràng, bao quát tốt mọi hoạt động kỹ thuật và giúp tiết kiệm tối đa thời gian khi cần đào tạo, bàn giao cho đội ngũ."};
